<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketlab - Máy Tính Giá Vốn</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Phosphor Icons (thay thế cho Lucide trong môi trường HTML) -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <!-- React & ReactDOM (phiên bản production chạy trực tiếp) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Babel (biên dịch JSX trên trình duyệt) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    const RANDOM_COLORS = [
      'bg-purple-100 text-purple-800 border-purple-200',
      'bg-pink-100 text-pink-800 border-pink-200',
      'bg-indigo-100 text-indigo-800 border-indigo-200',
      'bg-teal-100 text-teal-800 border-teal-200',
      'bg-cyan-100 text-cyan-800 border-cyan-200',
      'bg-lime-100 text-lime-800 border-lime-200'
    ];

    const useLocalStorage = (key, initialValue) => {
      const [storedValue, setStoredValue] = useState(() => {
        try {
          const item = window.localStorage.getItem(key);
          return item ? JSON.parse(item) : initialValue;
        } catch (error) {
          console.error(error);
          return initialValue;
        }
      });

      useEffect(() => {
        try {
          window.localStorage.setItem(key, JSON.stringify(storedValue));
        } catch (error) {
          console.error(error);
        }
      }, [key, storedValue]);

      return [storedValue, setStoredValue];
    };

    function App() {
      // --- STATE QUẢN LÝ NGUYÊN LIỆU (CÀI ĐẶT) ---
      const [noodleTypes, setNoodleTypes] = useLocalStorage('marketlab_noodleTypes', [
        { id: 'noodle_1', name: 'Mì gói thường', price: 6000 },
        { id: 'noodle_2', name: 'Mì gói cao cấp', price: 30000 },
      ]);

      const [toppingTypes, setToppingTypes] = useLocalStorage('marketlab_toppingTypes', [
        { id: 'chicken', name: 'Ức gà viên', pricePerKg: 180000, yieldPerKg: 75, color: 'bg-amber-100 text-amber-800 border-amber-200' },
        { id: 'pork', name: 'Heo viên', pricePerKg: 270000, yieldPerKg: 75, color: 'bg-rose-100 text-rose-800 border-rose-200' },
        { id: 'beef', name: 'Thăn bò viên', pricePerKg: 300000, yieldPerKg: 75, color: 'bg-red-100 text-red-800 border-red-200' },
        { id: 'shrimp', name: 'Tôm viên', pricePerKg: 300000, yieldPerKg: 75, color: 'bg-orange-100 text-orange-800 border-orange-200' },
        { id: 'mackerel', name: 'Cá thu viên', pricePerKg: 340000, yieldPerKg: 75, color: 'bg-blue-100 text-blue-800 border-blue-200' },
      ]);

      // --- STATE TÍNH TOÁN (ORDER HIỆN TẠI) ---
      const [noodleSelections, setNoodleSelections] = useState({'noodle_1': 1});
      const [toppingSelections, setToppingSelections] = useState({});
      const [otherCosts, setOtherCosts] = useLocalStorage('marketlab_otherCosts', 2000);
      const [profitMargin, setProfitMargin] = useLocalStorage('marketlab_profitMargin', 40);
      
      // Tùy chỉnh giá bán
      const [customSalePrice, setCustomSalePrice] = useState('');

      // --- STATE QUẢN LÝ MENU & GIAO DIỆN ---
      const [activeTab, setActiveTab] = useState('calculator'); // 'calculator', 'menu', 'settings'
      const [menuItems, setMenuItems] = useLocalStorage('marketlab_menuItems', []);
      const [productName, setProductName] = useState('');

      // --- STATE FORM THÊM NGUYÊN LIỆU MỚI ---
      const [newMaterialTab, setNewMaterialTab] = useState('noodle');
      const [newMatName, setNewMatName] = useState('');
      const [newMatPrice, setNewMatPrice] = useState('');
      const [newMatYield, setNewMatYield] = useState(75);

      // --- STATE FORM SỬA NGUYÊN LIỆU ---
      const [editingId, setEditingId] = useState(null);
      const [editForm, setEditForm] = useState({ name: '', price: '', yieldPerKg: 75, type: 'noodle' });

      // --- STATE SỬA MENU ---
      const [editingMenuId, setEditingMenuId] = useState(null);
      const [editMenuForm, setEditMenuForm] = useState({ name: '', price: '' });

      // --- FUNCTIONS: CẬP NHẬT SỐ LƯỢNG ---
      const updateQuantity = (type, id, delta) => {
        if (type === 'noodle') {
          setNoodleSelections(prev => ({
            ...prev,
            [id]: Math.max(0, (prev[id] || 0) + delta)
          }));
        } else {
          setToppingSelections(prev => ({
            ...prev,
            [id]: Math.max(0, (prev[id] || 0) + delta)
          }));
        }
      };

      const formatCurrency = (amount) => {
        return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(Math.round(amount));
      };

      // --- CALCULATIONS ---
      const calculations = useMemo(() => {
        let noodleTotal = 0;
        const itemizedNoodles = noodleTypes.map(type => {
          const quantity = noodleSelections[type.id] || 0;
          const totalCost = quantity * type.price;
          noodleTotal += totalCost;
          return { ...type, quantity, totalCost };
        }).filter(item => item.quantity > 0);
        
        let toppingTotal = 0;
        const itemizedToppings = toppingTypes.map(type => {
          const quantity = toppingSelections[type.id] || 0;
          const costPerUnit = Math.round(type.pricePerKg / type.yieldPerKg);
          const totalCost = quantity * costPerUnit;
          toppingTotal += totalCost;
          return { ...type, quantity, costPerUnit, totalCost };
        }).filter(item => item.quantity > 0);

        const totalFoodCost = noodleTotal + toppingTotal;
        const absoluteTotalCost = totalFoodCost + otherCosts;
        
        // Giá bán đề xuất tự động
        const exactSuggestedPrice = absoluteTotalCost / (1 - (profitMargin / 100));
        const suggestedPrice = Math.round(exactSuggestedPrice / 1000) * 1000;
        
        // Lấy giá chốt bán (nếu có nhập thì dùng, không thì dùng giá đề xuất)
        const finalPrice = customSalePrice !== '' ? Number(customSalePrice) : suggestedPrice;
        
        // Tính lại lợi nhuận và margin thực tế
        const profitAmount = finalPrice - absoluteTotalCost;
        const actualMargin = finalPrice > 0 ? (profitAmount / finalPrice) * 100 : 0;

        return {
          itemizedNoodles,
          noodleTotal,
          itemizedToppings,
          toppingTotal,
          totalFoodCost,
          absoluteTotalCost,
          suggestedPrice,
          finalPrice,
          profitAmount,
          actualMargin
        };
      }, [noodleSelections, toppingSelections, noodleTypes, toppingTypes, otherCosts, profitMargin, customSalePrice]);

      // --- FUNCTIONS: MENU MANGEMENT ---
      const handleAddToMenu = () => {
        if (!productName.trim()) return;
        
        const newItem = {
          id: Date.now(),
          name: productName,
          itemizedNoodles: calculations.itemizedNoodles,
          itemizedToppings: calculations.itemizedToppings,
          cost: calculations.absoluteTotalCost,
          price: calculations.finalPrice,
          profit: calculations.profitAmount,
          margin: calculations.actualMargin
        };
        
        setMenuItems([newItem, ...menuItems]);
        setProductName('');
        setCustomSalePrice(''); // Reset custom price
        setActiveTab('menu');
      };

      const handleDeleteMenu = (id) => {
        setMenuItems(menuItems.filter(item => item.id !== id));
      };

      const handleEditMenuClick = (item) => {
        setEditingMenuId(item.id);
        setEditMenuForm({ name: item.name, price: item.price });
      };

      const handleSaveMenuEdit = () => {
        if (!editMenuForm.name.trim() || !editMenuForm.price) return;
        const newPrice = Number(editMenuForm.price);
        
        setMenuItems(prev => prev.map(item => {
          if (item.id === editingMenuId) {
            const profit = newPrice - item.cost;
            const margin = newPrice > 0 ? (profit / newPrice) * 100 : 0;
            return { ...item, name: editMenuForm.name, price: newPrice, profit, margin };
          }
          return item;
        }));
        setEditingMenuId(null);
      };

      const handleCancelMenuEdit = () => {
        setEditingMenuId(null);
      };

      // --- FUNCTIONS: CÀI ĐẶT NGUYÊN LIỆU ---
      const handleAddMaterial = () => {
        if (!newMatName.trim() || !newMatPrice) return;

        if (newMaterialTab === 'noodle') {
          const newType = {
            id: `noodle_${Date.now()}`,
            name: newMatName,
            price: Number(newMatPrice)
          };
          setNoodleTypes([...noodleTypes, newType]);
        } else {
          const randomColor = RANDOM_COLORS[Math.floor(Math.random() * RANDOM_COLORS.length)];
          const newType = {
            id: `topping_${Date.now()}`,
            name: newMatName,
            pricePerKg: Number(newMatPrice),
            yieldPerKg: Number(newMatYield) || 75,
            color: randomColor
          };
          setToppingTypes([...toppingTypes, newType]);
        }
        setNewMatName('');
        setNewMatPrice('');
        setNewMatYield(75);
      };

      const handleDeleteMaterial = (type, id) => {
        if (type === 'noodle') {
          setNoodleTypes(noodleTypes.filter(item => item.id !== id));
          const newSelections = {...noodleSelections};
          delete newSelections[id];
          setNoodleSelections(newSelections);
        } else {
          setToppingTypes(toppingTypes.filter(item => item.id !== id));
          const newSelections = {...toppingSelections};
          delete newSelections[id];
          setToppingSelections(newSelections);
        }
      };

      // --- FUNCTIONS: SỬA NGUYÊN LIỆU ---
      const handleEditClick = (type, item) => {
        setEditingId(item.id);
        if (type === 'noodle') {
          setEditForm({ name: item.name, price: item.price, yieldPerKg: 75, type: 'noodle' });
        } else {
          setEditForm({ name: item.name, price: item.pricePerKg, yieldPerKg: item.yieldPerKg, type: 'topping' });
        }
      };

      const handleSaveEdit = () => {
        if (!editForm.name.trim() || !editForm.price) return;
        if (editForm.type === 'noodle') {
          setNoodleTypes(prev => prev.map(n => n.id === editingId ? { ...n, name: editForm.name, price: Number(editForm.price) } : n));
        } else {
          setToppingTypes(prev => prev.map(t => t.id === editingId ? { ...t, name: editForm.name, pricePerKg: Number(editForm.price), yieldPerKg: Number(editForm.yieldPerKg) || 1 } : t));
        }
        setEditingId(null);
      };
      
      const handleCancelEdit = () => {
        setEditingId(null);
      };

      return (
        <div className="min-h-screen p-4 md:p-6 font-sans text-slate-800 pb-20">
          <div className="max-w-6xl mx-auto space-y-6">
            
            {/* Header & Navigation */}
            <div className="bg-white rounded-2xl p-4 md:p-6 shadow-sm border border-slate-200 flex flex-col md:flex-row items-center justify-between gap-6">
              <div className="flex items-center gap-4">
                <div className="bg-gradient-to-br from-rose-500 to-rose-600 p-3.5 rounded-xl text-white shadow-rose-200 shadow-lg flex items-center justify-center">
                  <i className="ph-bold ph-chef-hat text-3xl"></i>
                </div>
                <div>
                  <h1 className="text-2xl md:text-3xl font-black text-slate-900 tracking-tight">Marketlab<span className="text-rose-500">POS</span></h1>
                  <p className="text-slate-500 font-medium text-sm">Quản lý Costing & Menu Thông Minh</p>
                </div>
              </div>

              {/* Navigation Tabs */}
              <div className="flex bg-slate-100 p-1.5 rounded-xl w-full md:w-auto self-start md:self-auto overflow-x-auto hide-scrollbar">
                <button onClick={() => setActiveTab('calculator')} className={`flex items-center gap-2 px-5 py-2.5 rounded-lg font-bold text-sm transition-all whitespace-nowrap ${activeTab === 'calculator' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                  <i className="ph-bold ph-calculator text-lg"></i> Tính Giá
                </button>
                <button onClick={() => setActiveTab('menu')} className={`flex items-center gap-2 px-5 py-2.5 rounded-lg font-bold text-sm transition-all whitespace-nowrap ${activeTab === 'menu' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                  <i className="ph-bold ph-book-open text-lg"></i> Menu
                  {menuItems.length > 0 && <span className="bg-rose-500 text-white text-[10px] px-2 py-0.5 rounded-full ml-1">{menuItems.length}</span>}
                </button>
                <button onClick={() => setActiveTab('settings')} className={`flex items-center gap-2 px-5 py-2.5 rounded-lg font-bold text-sm transition-all whitespace-nowrap ${activeTab === 'settings' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                  <i className="ph-bold ph-gear text-lg"></i> Nguyên liệu
                </button>
              </div>
            </div>

            {/* --- TAB 1: CALCULATOR --- */}
            {activeTab === 'calculator' && (
              <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
                
                {/* Left Column: Inputs */}
                <div className="lg:col-span-7 space-y-6">
                  
                  {/* Noodles Input */}
                  <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                    <h2 className="text-lg font-bold mb-4 flex items-center gap-2 text-slate-800">
                      <i className="ph-bold ph-package text-xl text-amber-500"></i>
                      Chọn Mì Gói
                    </h2>
                    <div className="space-y-3">
                      {noodleTypes.map((type) => (
                        <div key={type.id} className="flex items-center justify-between p-4 bg-slate-50 rounded-xl border border-slate-100 hover:border-slate-200 transition-colors">
                          <div className="flex flex-col">
                            <span className="font-semibold text-slate-800">{type.name}</span>
                            <span className="text-sm text-slate-500">{formatCurrency(type.price)} / gói</span>
                          </div>
                          <div className="flex items-center gap-4 bg-white px-2 py-1 rounded-lg border border-slate-200 shadow-sm">
                            <button onClick={() => updateQuantity('noodle', type.id, -1)} className="p-1.5 hover:bg-slate-100 rounded-md text-slate-600 transition-colors">
                              <i className="ph-bold ph-minus text-base"></i>
                            </button>
                            <span className="w-6 text-center font-bold">{noodleSelections[type.id] || 0}</span>
                            <button onClick={() => updateQuantity('noodle', type.id, 1)} className="p-1.5 hover:bg-slate-100 rounded-md text-slate-600 transition-colors">
                              <i className="ph-bold ph-plus text-base"></i>
                            </button>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Meatballs Input */}
                  <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                    <div className="flex justify-between items-center mb-4">
                      <h2 className="text-lg font-bold flex items-center gap-2 text-slate-800">
                        <i className="ph-bold ph-shopping-cart text-xl text-rose-500"></i>
                        Topping Thịt Viên
                      </h2>
                      <span className="text-xs font-semibold bg-rose-50 text-rose-600 px-3 py-1.5 rounded-lg border border-rose-100">
                        Tuỳ chỉnh số lượng
                      </span>
                    </div>
                    
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                      {toppingTypes.map((type) => (
                        <div key={type.id} className={`flex items-center justify-between p-4 rounded-xl border ${type.color} bg-opacity-20 hover:bg-opacity-30 transition-all`}>
                          <div className="flex flex-col">
                            <span className="font-bold text-sm">{type.name}</span>
                            <span className="text-[11px] opacity-80 mt-1 font-medium">
                              {formatCurrency(type.pricePerKg / type.yieldPerKg)} / viên 
                            </span>
                          </div>
                          <div className="flex items-center gap-2 bg-white/80 backdrop-blur-sm px-1.5 py-1 rounded-lg shadow-sm border border-white/50">
                            <button onClick={() => updateQuantity('topping', type.id, -1)} className="p-1 hover:bg-black/5 rounded-md transition-colors">
                              <i className="ph-bold ph-minus text-sm"></i>
                            </button>
                            <span className="w-5 text-center font-bold text-sm">{toppingSelections[type.id] || 0}</span>
                            <button onClick={() => updateQuantity('topping', type.id, 1)} className="p-1 hover:bg-black/5 rounded-md transition-colors">
                              <i className="ph-bold ph-plus text-sm"></i>
                            </button>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Other Costs & Margins */}
                  <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 flex flex-col sm:flex-row gap-6">
                    <div className="flex-1 space-y-2">
                      <label className="text-sm font-bold text-slate-700 flex items-center gap-2">
                        <i className="ph-bold ph-calculator text-base text-blue-500"></i>
                        Chi phí khác (Hộp, đũa...)
                      </label>
                      <div className="relative">
                        <input 
                          type="number" 
                          value={otherCosts}
                          onChange={(e) => setOtherCosts(Number(e.target.value))}
                          className="w-full pl-4 pr-12 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all font-semibold text-slate-800"
                        />
                        <span className="absolute right-4 top-3.5 text-slate-400 font-medium text-sm">VNĐ</span>
                      </div>
                    </div>
                    <div className="flex-1 space-y-2">
                      <label className="text-sm font-bold text-slate-700 flex items-center gap-2">
                        <i className="ph-bold ph-trend-up text-base text-emerald-500"></i>
                        Biên lợi nhuận kỳ vọng
                      </label>
                      <div className="relative">
                        <input 
                          type="number" 
                          value={profitMargin}
                          onChange={(e) => setProfitMargin(Number(e.target.value))}
                          className="w-full pl-4 pr-10 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-emerald-500 focus:outline-none transition-all font-semibold text-slate-800"
                        />
                        <span className="absolute right-4 top-3.5 text-slate-400 font-medium text-sm">%</span>
                      </div>
                    </div>
                  </div>

                </div>

                {/* Right Column: Results / Receipt */}
                <div className="lg:col-span-5 relative">
                  <div className="bg-slate-900 rounded-3xl p-6 shadow-xl sticky top-6 overflow-hidden">
                    {/* Decorative dots */}
                    <div className="absolute top-0 left-0 w-full h-3 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4IiBoZWlnaHQ9IjgiPgo8Y2lyY2xlIGN4PSI0IiBjeT0iNCIgcj0iMiIgZmlsbD0iIzMzNDE1NSIvPgo8L3N2Zz4=')] opacity-50"></div>

                    <div className="flex items-center gap-3 mb-6 pb-6 border-b border-slate-800/80 pt-2">
                      <i className="ph-bold ph-receipt text-[28px] text-rose-400"></i>
                      <h2 className="text-xl font-bold tracking-wide text-white">PHIẾU TÍNH COST</h2>
                    </div>

                    {/* Receipt Items */}
                    <div className="space-y-4 mb-6 min-h-[120px]">
                      {calculations.itemizedNoodles.map((item, idx) => (
                        <div key={`n_${idx}`} className="flex justify-between items-center">
                          <span className="text-slate-300 font-medium"><span className="text-amber-400">{item.quantity}x</span> {item.name}</span>
                          <span className="font-semibold text-white">{formatCurrency(item.totalCost)}</span>
                        </div>
                      ))}
                      
                      {calculations.itemizedToppings.map((item, idx) => (
                        <div key={`t_${idx}`} className="flex justify-between items-center text-sm">
                          <span className="text-slate-400"><span className="text-rose-400">{item.quantity}x</span> {item.name} <span className="text-[10px] opacity-50">({formatCurrency(item.costPerUnit)})</span></span>
                          <span className="font-medium text-slate-200">{formatCurrency(item.totalCost)}</span>
                        </div>
                      ))}

                      {calculations.itemizedToppings.length === 0 && calculations.itemizedNoodles.length === 0 && (
                        <div className="text-center text-slate-600 text-sm py-4 italic">
                          Chưa chọn nguyên liệu nào...
                        </div>
                      )}
                    </div>

                    {/* Summary Lines */}
                    <div className="space-y-3 pt-5 border-t border-slate-800/80 text-sm">
                      <div className="flex justify-between items-center text-slate-400">
                        <span>Nguyên liệu (Food Cost):</span>
                        <span>{formatCurrency(calculations.totalFoodCost)}</span>
                      </div>
                      <div className="flex justify-between items-center text-slate-400">
                        <span>Chi phí phụ:</span>
                        <span>{formatCurrency(otherCosts)}</span>
                      </div>
                      <div className="flex justify-between items-center font-bold text-rose-400 text-base pt-2">
                        <span>TỔNG GIÁ VỐN:</span>
                        <span>{formatCurrency(calculations.absoluteTotalCost)}</span>
                      </div>
                    </div>

                    {/* Pricing & Profit Suggestion */}
                    <div className="mt-6 bg-slate-800/50 rounded-2xl p-5 border border-slate-700">
                      <div className="flex justify-between items-center mb-3">
                        <span className="text-xs text-slate-400 uppercase tracking-wider font-semibold">Giá bán đề xuất</span>
                        <span className="text-sm font-bold text-slate-300">{formatCurrency(calculations.suggestedPrice)}</span>
                      </div>

                      {/* Tùy chỉnh giá chốt bán */}
                      <div className="mb-4">
                        <label className="text-xs text-emerald-400 font-semibold mb-1 block">CHỐT GIÁ BÁN THỰC TẾ (VNĐ)</label>
                        <div className="relative">
                          <i className="ph-bold ph-currency-dollar text-base absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                          <input 
                            type="number"
                            placeholder={calculations.suggestedPrice.toString()}
                            value={customSalePrice}
                            onChange={(e) => setCustomSalePrice(e.target.value)}
                            className="w-full bg-slate-900 border border-slate-600 text-white pl-9 pr-4 py-3 rounded-xl focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none text-lg font-bold transition-all"
                          />
                        </div>
                      </div>

                      <div className="flex justify-between text-sm pt-3 border-t border-slate-700">
                        <span className="text-slate-300">Lợi nhuận/tô:</span>
                        <span className="text-emerald-400 font-bold text-base">
                          {formatCurrency(calculations.profitAmount)} <span className="text-xs font-normal">({calculations.actualMargin.toFixed(1)}%)</span>
                        </span>
                      </div>
                    </div>

                    {/* Form lưu vào Menu */}
                    <div className="mt-6 pt-6 border-t border-slate-800">
                      <label className="text-sm font-semibold text-slate-300 flex items-center gap-2 mb-2">
                        <i className="ph-bold ph-tag text-base text-amber-400"></i>
                        Lưu công thức vào Menu
                      </label>
                      <div className="flex flex-col gap-3">
                        <input 
                          type="text" 
                          placeholder="Tên món. VD: Mì Đặc Biệt" 
                          value={productName}
                          onChange={(e) => setProductName(e.target.value)}
                          className="w-full px-4 py-3 rounded-xl bg-slate-800 border border-slate-600 text-white placeholder-slate-500 focus:outline-none focus:border-rose-500 focus:ring-1 focus:ring-rose-500 font-medium"
                        />
                        <button 
                          onClick={handleAddToMenu}
                          disabled={!productName.trim() || (calculations.itemizedNoodles.length === 0 && calculations.itemizedToppings.length === 0)}
                          className="w-full bg-rose-500 hover:bg-rose-600 disabled:bg-slate-800 disabled:text-slate-600 disabled:border disabled:border-slate-700 text-white py-3.5 rounded-xl font-bold transition-colors flex items-center justify-center gap-2 shadow-lg shadow-rose-500/20"
                        >
                          <i className="ph-bold ph-floppy-disk text-lg"></i>
                          <span>Lưu Menu Chính Thức</span>
                        </button>
                      </div>
                    </div>

                  </div>
                </div>

              </div>
            )}

            {/* --- TAB 2: MENU CHÍNH THỨC --- */}
            {activeTab === 'menu' && (
              <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
                <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 flex justify-between items-center">
                  <div>
                    <h2 className="text-xl font-black flex items-center gap-2 text-slate-900">
                      <i className="ph-bold ph-book-open text-xl text-rose-500"></i>
                      Menu Quán Của Bạn
                    </h2>
                    <p className="text-slate-500 text-sm mt-1">Danh sách các combo đã chốt giá và lợi nhuận.</p>
                  </div>
                  <span className="text-sm text-rose-700 font-bold bg-rose-50 border border-rose-100 px-4 py-2 rounded-xl shadow-sm">
                    Tổng: {menuItems.length} món
                  </span>
                </div>

                {menuItems.length === 0 ? (
                  <div className="text-center py-24 bg-white rounded-2xl border border-slate-200 border-dashed">
                    <div className="bg-slate-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                      <i className="ph-bold ph-book-open text-4xl text-slate-400"></i>
                    </div>
                    <h3 className="text-xl font-bold text-slate-800 mb-2">Menu Đang Trống</h3>
                    <p className="text-slate-500 max-w-sm mx-auto">Bạn chưa tạo món nào. Hãy vào Máy Tính Giá Vốn, mix một combo hoàn hảo và lưu lại nhé.</p>
                    <button 
                      onClick={() => setActiveTab('calculator')}
                      className="mt-6 text-white font-bold bg-slate-900 hover:bg-slate-800 px-6 py-3 rounded-xl transition-colors shadow-lg"
                    >
                      Bắt đầu tính giá
                    </button>
                  </div>
                ) : (
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    {menuItems.map((item) => (
                      <div key={item.id} className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col group hover:shadow-md transition-shadow">
                        <div className="p-5 bg-slate-900 text-white flex justify-between items-start relative overflow-hidden">
                          <div className="absolute -right-6 -top-6 text-slate-800 opacity-50 transform rotate-12">
                            <i className="ph-bold ph-chef-hat text-[80px]"></i>
                          </div>
                          {editingMenuId === item.id ? (
                            <div className="w-full relative z-10 space-y-2 pr-2">
                              <input type="text" value={editMenuForm.name} onChange={(e) => setEditMenuForm({...editMenuForm, name: e.target.value})} className="w-full px-3 py-1.5 rounded-lg border border-slate-700 bg-slate-800 text-sm focus:border-rose-500 focus:outline-none focus:ring-1 focus:ring-rose-500 font-bold" placeholder="Tên món" />
                              <div className="flex items-center gap-2">
                                <span className="text-xs text-slate-400 font-semibold w-8">Giá:</span>
                                <input type="number" value={editMenuForm.price} onChange={(e) => setEditMenuForm({...editMenuForm, price: e.target.value})} className="w-full px-3 py-1.5 rounded-lg border border-slate-700 bg-slate-800 text-sm focus:border-rose-500 focus:outline-none focus:ring-1 focus:ring-rose-500 font-bold" placeholder="Giá bán" />
                              </div>
                              <div className="flex justify-end gap-2 pt-1 border-t border-slate-800 mt-2">
                                <button onClick={handleCancelMenuEdit} className="px-3 py-1.5 text-xs font-bold text-slate-400 hover:text-white hover:bg-slate-800 rounded-lg transition-colors">Hủy</button>
                                <button onClick={handleSaveMenuEdit} className="px-3 py-1.5 text-xs font-bold text-white bg-rose-500 hover:bg-rose-600 rounded-lg shadow-sm transition-colors">Lưu</button>
                              </div>
                            </div>
                          ) : (
                            <>
                              <h3 className="font-bold text-xl leading-tight pr-4 relative z-10">{item.name}</h3>
                              <div className="flex gap-1 relative z-10 flex-shrink-0">
                                <button onClick={() => handleEditMenuClick(item)} className="text-slate-400 hover:text-indigo-400 bg-slate-800 hover:bg-slate-700 p-2 rounded-lg transition-colors" title="Sửa tên & giá">
                                  <i className="ph-bold ph-pencil-simple text-base"></i>
                                </button>
                                <button onClick={() => handleDeleteMenu(item.id)} className="text-slate-400 hover:text-rose-400 bg-slate-800 hover:bg-slate-700 p-2 rounded-lg transition-colors" title="Xóa món">
                                  <i className="ph-bold ph-trash text-base"></i>
                                </button>
                              </div>
                            </>
                          )}
                        </div>
                        <div className="p-5 flex-1 flex flex-col">
                          <div className="text-sm text-slate-600 mb-4 flex-1 space-y-2.5">
                            {item.itemizedNoodles.map(n => (
                              <div key={n.id} className="flex items-center gap-2 font-medium">
                                <i className="ph-bold ph-package text-sm text-amber-500"></i> {n.quantity}x {n.name}
                              </div>
                            ))}
                            {item.itemizedToppings.map(t => (
                              <div key={t.id} className="flex items-center gap-2 font-medium">
                                <i className="ph-fill ph-check-circle text-sm text-emerald-500"></i> {t.quantity}x {t.name}
                              </div>
                            ))}
                          </div>
                          
                          <div className="bg-slate-50 rounded-xl p-4 space-y-3 border border-slate-100 text-sm mt-auto">
                            <div className="flex justify-between text-slate-500 font-medium">
                              <span>Giá vốn (Cost):</span>
                              <span className="text-slate-800">{formatCurrency(item.cost)}</span>
                            </div>
                            <div className="flex justify-between text-slate-500 font-medium">
                              <span>Lãi gộp:</span>
                              <span className="text-emerald-600 font-bold">
                                {formatCurrency(item.profit)} <span className="text-xs">({item.margin.toFixed(0)}%)</span>
                              </span>
                            </div>
                            <div className="flex justify-between items-center pt-3 border-t border-slate-200/60">
                              <span className="font-bold text-slate-800">GIÁ BÁN:</span>
                              <span className="text-2xl font-black text-rose-600">{formatCurrency(item.price)}</span>
                            </div>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* --- TAB 3: CÀI ĐẶT NGUYÊN LIỆU --- */}
            {activeTab === 'settings' && (
              <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
                <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                  <h2 className="text-xl font-black flex items-center gap-2 text-slate-900 mb-2">
                    <i className="ph-bold ph-stack text-xl text-indigo-500"></i>
                    Quản lý Nguyên Vật Liệu
                  </h2>
                  <p className="text-slate-500 text-sm">Thêm mới, xóa hoặc chỉnh sửa danh mục mì gói và topping thịt viên của bạn để tự động cập nhật vào máy tính.</p>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
                  
                  {/* Form thêm mới */}
                  <div className="lg:col-span-5 bg-white rounded-2xl p-6 shadow-sm border border-slate-200 sticky top-6">
                    <h3 className="font-bold text-lg text-slate-800 mb-4 border-b border-slate-100 pb-3">Thêm nguyên liệu mới</h3>
                    
                    {/* Chọn loại nguyên liệu */}
                    <div className="flex bg-slate-100 p-1 rounded-xl mb-5">
                      <button 
                        onClick={() => setNewMaterialTab('noodle')}
                        className={`flex-1 py-2 text-sm font-bold rounded-lg transition-all ${newMaterialTab === 'noodle' ? 'bg-white shadow-sm text-amber-600' : 'text-slate-500'}`}
                      >
                        Mì gói
                      </button>
                      <button 
                        onClick={() => setNewMaterialTab('topping')}
                        className={`flex-1 py-2 text-sm font-bold rounded-lg transition-all ${newMaterialTab === 'topping' ? 'bg-white shadow-sm text-rose-600' : 'text-slate-500'}`}
                      >
                        Topping
                      </button>
                    </div>

                    <div className="space-y-4">
                      <div>
                        <label className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 block">Tên hiển thị</label>
                        <input 
                          type="text" 
                          value={newMatName}
                          onChange={(e) => setNewMatName(e.target.value)}
                          placeholder={newMaterialTab === 'noodle' ? "VD: Mì Udon" : "VD: Xúc xích phô mai"}
                          className="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition-all"
                        />
                      </div>

                      <div>
                        <label className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 block">
                          {newMaterialTab === 'noodle' ? 'Giá nhập / 1 Gói (VNĐ)' : 'Giá nhập / 1 Kg (VNĐ)'}
                        </label>
                        <input 
                          type="number" 
                          value={newMatPrice}
                          onChange={(e) => setNewMatPrice(e.target.value)}
                          placeholder="VD: 150000"
                          className="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition-all"
                        />
                      </div>

                      {newMaterialTab === 'topping' && (
                        <div>
                          <label className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 block">Định lượng (Viên / 1 Kg)</label>
                          <input 
                            type="number" 
                            value={newMatYield}
                            onChange={(e) => setNewMatYield(e.target.value)}
                            placeholder="Mặc định: 75"
                            className="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition-all"
                          />
                          <p className="text-[11px] text-slate-400 mt-1">Gợi ý: Nếu 200g có 15 viên, thì 1kg sẽ có 75 viên.</p>
                        </div>
                      )}

                      <button 
                        onClick={handleAddMaterial}
                        disabled={!newMatName.trim() || !newMatPrice}
                        className="w-full mt-4 bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-300 text-white py-3 rounded-xl font-bold transition-colors shadow-lg shadow-indigo-600/20"
                      >
                        Thêm Vào Danh Mục
                      </button>
                    </div>
                  </div>

                  {/* Danh sách hiện tại */}
                  <div className="lg:col-span-7 space-y-6">
                    
                    {/* List Mì */}
                    <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                      <h3 className="font-bold text-lg text-slate-800 mb-4 flex items-center gap-2">
                        <i className="ph-bold ph-package text-xl text-amber-500"></i>
                        Danh Mục Mì Gói
                      </h3>
                      <div className="space-y-3">
                        {noodleTypes.map(item => (
                          <div key={item.id}>
                            {editingId === item.id ? (
                              <div className="flex flex-col gap-3 p-4 bg-indigo-50/50 rounded-xl border border-indigo-200">
                                <div className="space-y-2">
                                  <div>
                                    <label className="text-[10px] font-bold text-slate-500 uppercase">Tên hiển thị</label>
                                    <input type="text" value={editForm.name} onChange={(e) => setEditForm({...editForm, name: e.target.value})} className="w-full px-3 py-2 rounded-lg border border-slate-300 bg-white text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" />
                                  </div>
                                  <div>
                                    <label className="text-[10px] font-bold text-slate-500 uppercase">Giá (VNĐ) / Gói</label>
                                    <input type="number" value={editForm.price} onChange={(e) => setEditForm({...editForm, price: e.target.value})} className="w-full px-3 py-2 rounded-lg border border-slate-300 bg-white text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" />
                                  </div>
                                </div>
                                <div className="flex justify-end gap-2 mt-1 border-t border-indigo-100 pt-3">
                                  <button onClick={handleCancelEdit} className="px-3 py-1.5 text-xs font-bold text-slate-500 hover:bg-slate-200 rounded-lg">Hủy</button>
                                  <button onClick={handleSaveEdit} className="px-4 py-1.5 text-xs font-bold text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg shadow-sm">Lưu Thay Đổi</button>
                                </div>
                              </div>
                            ) : (
                              <div className="flex justify-between items-center p-4 bg-slate-50 rounded-xl border border-slate-100 group">
                                <div>
                                  <p className="font-bold text-slate-800 group-hover:text-amber-600 transition-colors">{item.name}</p>
                                  <p className="text-sm text-slate-500">{formatCurrency(item.price)}/gói</p>
                                </div>
                                <div className="flex items-center gap-1">
                                  <button onClick={() => handleEditClick('noodle', item)} className="p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors" title="Sửa tên & giá">
                                    <i className="ph-bold ph-pencil-simple text-lg"></i>
                                  </button>
                                  <button onClick={() => handleDeleteMaterial('noodle', item.id)} className="p-2 text-slate-400 hover:text-rose-500 hover:bg-rose-50 rounded-lg transition-colors" title="Xóa nguyên liệu">
                                    <i className="ph-bold ph-trash text-lg"></i>
                                  </button>
                                </div>
                              </div>
                            )}
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* List Topping */}
                    <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                      <h3 className="font-bold text-lg text-slate-800 mb-4 flex items-center gap-2">
                        <i className="ph-bold ph-shopping-cart text-xl text-rose-500"></i>
                        Danh Mục Topping
                      </h3>
                      <div className="space-y-3">
                        {toppingTypes.map(item => (
                          <div key={item.id}>
                            {editingId === item.id ? (
                              <div className="flex flex-col gap-3 p-4 bg-indigo-50/50 rounded-xl border border-indigo-200">
                                <div className="space-y-2">
                                  <div>
                                    <label className="text-[10px] font-bold text-slate-500 uppercase">Tên hiển thị</label>
                                    <input type="text" value={editForm.name} onChange={(e) => setEditForm({...editForm, name: e.target.value})} className="w-full px-3 py-2 rounded-lg border border-slate-300 bg-white text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" />
                                  </div>
                                  <div className="flex gap-3">
                                    <div className="flex-1">
                                      <label className="text-[10px] font-bold text-slate-500 uppercase">Giá / Kg</label>
                                      <input type="number" value={editForm.price} onChange={(e) => setEditForm({...editForm, price: e.target.value})} className="w-full px-3 py-2 rounded-lg border border-slate-300 bg-white text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" />
                                    </div>
                                    <div className="w-24">
                                      <label className="text-[10px] font-bold text-slate-500 uppercase">Viên / Kg</label>
                                      <input type="number" value={editForm.yieldPerKg} onChange={(e) => setEditForm({...editForm, yieldPerKg: e.target.value})} className="w-full px-3 py-2 rounded-lg border border-slate-300 bg-white text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" />
                                    </div>
                                  </div>
                                </div>
                                <div className="flex justify-end gap-2 mt-1 border-t border-indigo-100 pt-3">
                                  <button onClick={handleCancelEdit} className="px-3 py-1.5 text-xs font-bold text-slate-500 hover:bg-slate-200 rounded-lg">Hủy</button>
                                  <button onClick={handleSaveEdit} className="px-4 py-1.5 text-xs font-bold text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg shadow-sm">Lưu Thay Đổi</button>
                                </div>
                              </div>
                            ) : (
                              <div className="flex justify-between items-center p-4 bg-slate-50 rounded-xl border border-slate-100 group">
                                <div>
                                  <p className="font-bold text-slate-800 group-hover:text-rose-600 transition-colors">{item.name}</p>
                                  <p className="text-sm text-slate-500 mt-0.5">
                                    <span className="font-medium text-slate-600 border border-slate-200 bg-white px-1.5 py-0.5 rounded mr-1">Cost: {formatCurrency(Math.round(item.pricePerKg / item.yieldPerKg))}/viên</span> <span className="mx-1 opacity-50">•</span> {formatCurrency(item.pricePerKg)}/kg <span className="opacity-60 text-[11px]">({item.yieldPerKg}v)</span>
                                  </p>
                                </div>
                                <div className="flex items-center gap-1">
                                  <button onClick={() => handleEditClick('topping', item)} className="p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors" title="Sửa giá & định lượng">
                                    <i className="ph-bold ph-pencil-simple text-lg"></i>
                                  </button>
                                  <button onClick={() => handleDeleteMaterial('topping', item.id)} className="p-2 text-slate-400 hover:text-rose-500 hover:bg-rose-50 rounded-lg transition-colors" title="Xóa nguyên liệu">
                                    <i className="ph-bold ph-trash text-lg"></i>
                                  </button>
                                </div>
                              </div>
                            )}
                          </div>
                        ))}
                      </div>
                    </div>

                  </div>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
